<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N배송 설정 가이드</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Pretendard;
  background:#f6f8fb;
}

.app{
  display:flex;
  height:100vh;
}

/* ================= LEFT ================= */
.sidebar{
  width:300px;
  background:#fff;
  border-right:1px solid #eee;
  padding:20px;
  overflow:auto;
}

.step{
  margin-bottom:24px;
}

.step-title{
  font-weight:800;
  font-size:15px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

.badge{
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
}

.badge.done{background:#111;color:#fff}
.badge.ing{background:#0040d1;color:#fff}
.badge.wait{background:#e5e7eb;color:#555}

.sub{
  padding-left:10px;
}

.sub-item{
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  display:flex;
  justify-content:space-between;
}

.sub-item:hover{background:#f3f4f6}
.sub-item.active{background:#eef3ff;color:#0040d1;font-weight:700}

.optional{
  font-size:11px;
  color:#999;
  margin-left:6px;
}

/* ================= RIGHT ================= */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* top */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  border-bottom:1px solid #eee;
  background:#fff;
}

.title{
  font-size:22px;
  font-weight:800;
}

.progress{
  font-size:14px;
  font-weight:700;
  color:#0040d1;
}

/* content */
.content{
  flex:1;
  display:flex;
}

.left{
  width:50%;
  padding:30px;
  overflow:auto;
  border-right:1px solid #eee;
}

.right{
  width:50%;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.viewer{
  flex:1;
  background:#fff;
  border-radius:16px;
  border:1px solid #e5e7eb;
  overflow:hidden;
}

/* nav */
.nav{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.btn{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.btn-primary{
  background:#0040d1;
  color:#fff;
}
</style>
</head>

<body>

<div class="app">

  <!-- ================= SIDEBAR ================= -->
  <div class="sidebar" id="sidebar"></div>

  <!-- ================= MAIN ================= -->
  <div class="main">

    <div class="top">
      <div class="title" id="title">-</div>
      <div class="progress" id="progress">0%</div>
    </div>

    <div class="content">
      <div class="left" id="left"></div>

      <div class="right">
        <div class="viewer" id="right"></div>

        <div class="nav">
          <button class="btn" onclick="prev()">‹</button>
          <button class="btn" onclick="next()">›</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>

/* ================= DATA ================= */
const STEPS = [
  {
    title:"STEP1. 품고 나우 설정",
    items:[
      {title:"품고 나우 로그인", required:true, left:"./steps/step1-login-left.html", right:["./steps/step1-login-right-1.html","./steps/step1-login-right-2.html","./steps/step1-login-right-3.html"]},
      {title:"구성원 추가", required:false, left:"./steps/step1-member-left.html", right:["./steps/step1-member-right-1.html"]}
    ]
  },
  {
    title:"STEP2. 풀필먼트 연동",
    items:[
      {title:"판매처 계정 등록", required:true},
      {title:"풀필먼트 연동", required:true},
      {title:"N배송 프로그램 약관 동의", required:true}
    ]
  },
  {
    title:"STEP3. SKU 등록",
    items:[
      {title:"SKU 등록", required:true},
      {title:"상품 매핑", required:true}
    ]
  },
  {
    title:"STEP4. 초도 입고",
    items:[
      {title:"입고 가이드", required:true},
      {title:"패킹리스트 제출", required:true}
    ]
  },
  {
    title:"STEP5. N배송 설정하기",
    items:[
      {title:"설정 완료", required:true}
    ]
  }
];

let currentStep=0;
let currentItem=0;
let currentSlide=0;

let done={};

/* ================= RENDER ================= */

function renderSidebar(){
  const el=document.getElementById("sidebar");
  el.innerHTML="";

  STEPS.forEach((step,sIdx)=>{
    const stepEl=document.createElement("div");
    stepEl.className="step";

    // 상태 계산
    const required=step.items.filter(i=>i.required);
    const doneCount=required.filter((_,i)=>done[`${sIdx}-${i}`]).length;

    let status="wait";
    if(doneCount===required.length) status="done";
    else if(sIdx===currentStep) status="ing";

    stepEl.innerHTML=`
      <div class="step-title">
        ${step.title}
        <span class="badge ${status}">
          ${status==="done"?"완료":status==="ing"?"진행중":"대기중"}
        </span>
      </div>
    `;

    const sub=document.createElement("div");
    sub.className="sub";

    step.items.forEach((item,iIdx)=>{
      const itemEl=document.createElement("div");
      itemEl.className="sub-item "+(sIdx===currentStep&&iIdx===currentItem?"active":"");

      itemEl.innerHTML=`
        <span>
          ${item.title}
          ${!item.required?'<span class="optional">선택</span>':''}
        </span>
      `;

      itemEl.onclick=()=>{
        currentStep=sIdx;
        currentItem=iIdx;
        currentSlide=0;
        render();
      };

      sub.appendChild(itemEl);
    });

    stepEl.appendChild(sub);
    el.appendChild(stepEl);
  });
}

async function loadHTML(path){
  if(!path) return "";
  const res=await fetch(path+"?v="+Date.now());
  return await res.text();
}

async function render(){
  renderSidebar();

  const step=STEPS[currentStep];
  const item=step.items[currentItem];

  document.getElementById("title").innerText=item.title;

  // 진행률 계산 (필수만)
  const total=STEPS.flatMap(s=>s.items).filter(i=>i.required).length;
  const doneCount=Object.keys(done).length;
  document.getElementById("progress").innerText=Math.floor(doneCount/total*100)+"%";

  // left
  if(item.left){
    document.getElementById("left").innerHTML=await loadHTML(item.left);
  }else{
    document.getElementById("left").innerHTML="";
  }

  // right
  if(item.right){
    document.getElementById("right").innerHTML=await loadHTML(item.right[currentSlide]);
  }
}

/* ================= NAV ================= */

function next(){
  const item=STEPS[currentStep].items[currentItem];

  // 완료 처리 (필수만)
  if(item.required){
    done[`${currentStep}-${currentItem}`]=true;
  }

  if(item.right && currentSlide < item.right.length-1){
    currentSlide++;
  }else{
    currentSlide=0;
    currentItem++;

    if(currentItem>=STEPS[currentStep].items.length){
      currentItem=0;
      currentStep++;
    }
  }

  render();
}

function prev(){
  if(currentSlide>0){
    currentSlide--;
  }else if(currentItem>0){
    currentItem--;
  }else if(currentStep>0){
    currentStep--;
  }
  render();
}

render();

</script>

</body>
</html>
