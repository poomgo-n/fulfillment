<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N배송 가이드</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"/>

<style>
* { box-sizing: border-box; margin:0; padding:0; font-family:Pretendard, sans-serif; }

:root{
  --bg: #f6f8fc;
  --surface: #ffffff;
  --line: #e6ebf5;
  --text: #1f2937;
  --muted: #667085;

  --brand: #0040d1;
  --brand-soft: #edf3ff;
  --brand-soft-2: #f8fbff;
  --brand-border: #cfe0ff;

  --lavender-soft: #f6f4ff;

  --shadow: 0 18px 40px rgba(0, 64, 209, 0.08);
}

html, body {
  width:100%;
  height:100%;
  background: linear-gradient(180deg, #f9fbff 0%, #f5f7fc 100%);
  overflow:hidden;
  color: var(--text);
}

body.video-modal-open {
  overflow:hidden;
}

.app {
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width:340px;
  background: linear-gradient(180deg, #fbfcff 0%, #f6f8fd 100%);
  border-right:1px solid var(--line);
  padding:20px 18px 12px;
  overflow:auto;
  flex-shrink:0;
}

.sidebar-brand {
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
  padding:8px 10px 14px;
}

.sidebar-brand img {
  height:28px;
  width:auto;
  object-fit:contain;
}

.sidebar-title {
  font-size:19px;
  font-weight:800;
  color: var(--text);
}

.sidebar-steps {
  display:flex;
  flex-direction:column;
  gap:12px;
  padding-bottom:14px;
}

.step-card {
  background: rgba(255,255,255,0.96);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
}

.step-card.current {
  border-color: var(--brand-border);
  background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
  box-shadow: 0 12px 26px rgba(0, 64, 209, 0.10);
}

.step-card.done {
  border-color: #dbe6fb;
  background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
}

.step-card-header {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}

.step-card-title {
  font-size:15px;
  font-weight:800;
  line-height:1.45;
  color: var(--text);
}

.badge {
  font-size:11px;
  padding:5px 9px;
  border-radius:999px;
  white-space:nowrap;
  flex-shrink:0;
  font-weight:800;
}

.badge.done {
  background: #eef4ff;
  color: var(--brand);
}

.badge.ing {
  background: var(--brand);
  color: #fff;
}

.badge.wait {
  background: #f2f4f7;
  color: #7a8599;
}

.step-items {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.sub-item {
  padding:10px 12px;
  border-radius:14px;
  cursor:pointer;
  font-size:14px;
  line-height:1.45;
  color:#4b5563;
  transition:0.2s ease;
}

.sub-item:hover {
  background:#f5f9ff;
}

.sub-item.active {
  background: linear-gradient(135deg, #eef4ff 0%, #f7faff 100%);
  color: var(--brand);
  font-weight:800;
  box-shadow: inset 0 0 0 1px rgba(0, 64, 209, 0.10);
}

.optional {
  font-size:11px;
  color:#98a2b3;
  margin-left:6px;
}

/* ===== MAIN ===== */
.main {
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  background: transparent;
  overflow:hidden;
}

.main-shell {
  flex:1;
  min-height:0;
  padding:24px;
  overflow:hidden;
}

.content-card {
  width:100%;
  height:100%;
  background: var(--surface);
  border:1px solid var(--line);
  border-radius:28px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow: var(--shadow);
}

/* ===== HEADER ===== */
.content-header {
  display:grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  align-items:center;
  gap:14px;
  padding:24px 28px;
  border-bottom:1px solid #edf2fa;
  background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
  flex-shrink:0;
}

.content-header-main {
  width:100%;
  max-width:820px;
  justify-self:center;
}

.content-title {
  font-size:28px;
  font-weight:900;
  color: var(--text);
  line-height:1.3;
  text-align:left;
}

.content-progress {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:120px;
  padding:10px 16px;
  border-radius:999px;
  background: var(--brand-soft);
  color: var(--brand);
  font-size:14px;
  font-weight:900;
  border:1px solid var(--brand-border);
}

.content-header-actions {
  display:flex;
  gap:10px;
  flex-shrink:0;
}

.btn {
  padding:12px 18px;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
  border:none;
  font-size:14px;
  transition:0.18s ease;
}

.btn-help {
  border:1px solid var(--brand-border);
  color: var(--brand);
  background:#fff;
}

.btn-help:hover {
  background:#f8fbff;
}

.btn-next {
  background: var(--brand);
  color:#fff;
  box-shadow: 0 10px 24px rgba(0, 64, 209, 0.18);
}

.btn-next:hover {
  filter:brightness(0.98);
}

.btn-complete {
  background: linear-gradient(135deg, #0c4be0 0%, #2d67eb 100%);
  color:#fff;
}

/* ===== BODY ===== */
.content-body {
  flex:1;
  min-height:0;
  overflow:hidden;
  padding:28px 28px 32px;
  background: linear-gradient(180deg, #fff 0%, #fcfdff 100%);
}

.step-content-shell {
  max-width:920px;
  height:100%;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  overflow:hidden;
}

.step-desc {
  width:100%;
  max-width:820px;
  margin:0 auto 20px;
  text-align:left;
  font-size:16px;
  line-height:1.9;
  color: var(--muted);
  flex-shrink:0;
}

.body-divider {
  width:100%;
  max-width:820px;
  height:1px;
  background: linear-gradient(90deg, transparent 0%, #dbe7fb 18%, #dbe7fb 82%, transparent 100%);
  margin:0 auto 24px;
  flex-shrink:0;
}

.step-section-title {
  text-align:center;
  font-size:22px;
  font-weight:900;
  color: var(--text);
  margin-bottom:20px;
  flex-shrink:0;
}

.step-content {
  max-width:820px;
  width:100%;
  margin:0 auto;
  overflow:hidden;
  flex:1;
}

/* 주입된 html 내부 공통 정리 */
.step-content .step-left-content {
  width:100%;
}

.step-content .step-left-content > section {
  width:100%;
  max-width:820px;
  margin-left:auto !important;
  margin-right:auto !important;
}

.step-content .step-left-content h4 {
  text-align:center;
}

.step-content .step-left-content ol,
.step-content .step-left-content ul,
.step-content .step-left-content p,
.step-content .step-left-content li {
  text-align:left;
}

.step-content .step-left-content > section + section {
  margin-top:16px !important;
}

/* ===== VIDEO CTA ===== */
.video-cta {
  margin-top:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}

.video-cta-text {
  font-size:18px;
  font-weight:800;
  color: var(--brand);
  letter-spacing:-0.01em;
}

.video-cta-arrow {
  width:42px;
  height:42px;
  border:none;
  border-radius:999px;
  background: var(--brand);
  color:#fff;
  font-size:20px;
  line-height:1;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow: 0 10px 20px rgba(0, 64, 209, 0.18);
  transition:0.18s ease;
}

.video-cta-arrow:hover {
  transform:translateX(1px) translateY(-1px);
  filter:brightness(0.98);
}

/* ===== HELP ===== */
.help {
  position:fixed;
  right:0;
  top:0;
  width:420px;
  height:100%;
  background:#fff;
  box-shadow:-10px 0 30px rgba(0,0,0,0.1);
  transform:translateX(100%);
  transition:0.3s;
  padding:20px;
  overflow:auto;
  z-index:100;
}

.help.open {
  transform:translateX(0);
}

.faq-item {
  margin-bottom:10px;
  border:1px solid #eee;
  border-radius:12px;
  overflow:hidden;
}

.faq-q {
  padding:12px;
  font-weight:700;
  cursor:pointer;
  background:#fff;
}

.faq-q:hover {
  background:#f8fbff;
}

.faq-a {
  display:none;
  padding:12px;
  font-size:14px;
  line-height:1.8;
  color:#4b5563;
}

.faq-item.open .faq-a {
  display:block;
}

/* ===== VIDEO MODAL ===== */
.video-modal {
  position:fixed;
  inset:0;
  display:none;
  z-index:2000;
}

.video-modal.open {
  display:block;
}

.video-modal-dim {
  position:absolute;
  inset:0;
  background:rgba(15, 23, 42, 0.62);
}

.video-modal-dialog {
  position:relative;
  z-index:2;
  width:min(1400px, calc(100vw - 60px));
  height:min(900px, calc(100vh - 60px));
  margin:30px auto;
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 24px 60px rgba(0, 0, 0, 0.28);
  display:flex;
  flex-direction:column;
}

.video-modal-header {
  height:64px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px 0 24px;
  border-bottom:1px solid #edf2fa;
  background:#fff;
}

.video-modal-title {
  font-size:18px;
  font-weight:900;
  color:#111827;
}

.video-modal-close {
  width:40px;
  height:40px;
  border:none;
  border-radius:999px;
  background:#f3f6fb;
  color: var(--brand);
  font-size:24px;
  line-height:1;
  cursor:pointer;
}

.video-modal-body {
  flex:1;
  min-height:0;
  background:#f8fafc;
}

.video-modal-body iframe {
  width:100%;
  height:100%;
  border:0;
  display:block;
  background:#f8fafc;
}

@media (max-width: 1024px) {
  .sidebar {
    width:290px;
  }

  .content-header {
    grid-template-columns: 1fr;
    align-items:flex-start;
  }

  .content-header-main {
    max-width:none;
    justify-self:stretch;
  }

  .content-header-actions {
    width:100%;
  }

  .content-header-actions .btn {
    flex:1;
  }
}

@media (max-width: 768px) {
  .app {
    flex-direction:column;
  }

  .sidebar {
    width:100%;
    height:auto;
    border-right:none;
    border-bottom:1px solid var(--line);
  }

  .main-shell {
    padding:12px;
  }

  .content-header,
  .content-body {
    padding:20px;
  }

  .content-title {
    font-size:22px;
  }

  .help {
    width:100%;
  }

  .video-modal-dialog {
    width:calc(100vw - 20px);
    height:calc(100vh - 20px);
    margin:10px auto;
    border-radius:16px;
  }

  .video-cta-text {
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="./Primary Logo.png" alt="Primary Logo" onerror="this.style.display='none'">
      <div class="sidebar-title">N배송 가이드</div>
    </div>

    <div id="sidebar" class="sidebar-steps"></div>
  </aside>

  <section class="main">
    <div class="main-shell">
      <div class="content-card">

        <div class="content-header">
          <div class="content-header-main">
            <div class="content-title" id="title"></div>
          </div>

          <div class="content-progress" id="progress"></div>

          <div class="content-header-actions">
            <button class="btn btn-help" id="helpBtn" type="button">도움말</button>
            <button class="btn btn-next" id="nextBtn" type="button">다음 단계</button>
          </div>
        </div>

        <div class="content-body">
          <div class="step-content-shell">
            <p class="step-desc" id="stepDesc"></p>
            <div class="body-divider"></div>
            <h3 class="step-section-title">진행 방법</h3>

            <div class="step-content" id="left"></div>

            <div class="video-cta">
              <div class="video-cta-text">진행 과정 보러가기</div>
              <button type="button" class="video-cta-arrow" id="openVideoBtn" aria-label="진행 과정 보러가기">→</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>
</div>

<div class="help" id="helpBox"></div>

<div class="video-modal" id="videoModal">
  <div class="video-modal-dim" id="videoModalDim"></div>

  <div class="video-modal-dialog">
    <div class="video-modal-header">
      <div class="video-modal-title" id="videoModalTitle">과정 영상</div>
      <button type="button" class="video-modal-close" id="videoModalClose">×</button>
    </div>

    <div class="video-modal-body">
      <iframe
        id="videoModalFrame"
        src=""
        title="과정 영상"
        loading="eager"
        referrerpolicy="no-referrer"
        allow="autoplay"
      ></iframe>
    </div>
  </div>
</div>

<script>
const STEPS = [
  {
    title: "STEP1. 품고 나우 설정",
    items: [
      {
        title: "품고 나우 로그인",
        required: true,
        left: "./steps/step1-login-left.html",
        right: "./steps/step1-login-right-player.html",
        help: "./help/step1-help.html",
        desc: "품고 나우 접속 및 기본 환경 설정을 진행합니다."
      },
      {
        title: "구성원 추가",
        required: false,
        left: "./steps/step1-member-left.html",
        right: "./steps/step1-member-right-player.html",
        help: "./help/step1-member-help.html",
        desc: "운영에 필요한 구성원을 추가하고 권한을 확인합니다."
      }
    ]
  },
  {
    title: "STEP2. 풀필먼트 연동",
    items: [
      {
        title: "판매처 계정 등록",
        required: true,
        left: "./steps/step2-new-left.html",
        right: "./steps/step2-new-right-player.html",
        help: "./help/step2-new-help.html",
        desc: "판매처 계정을 등록하여 연동 준비를 진행합니다."
      },
      {
        title: "풀필먼트 연동",
        required: true,
        left: "./steps/step2-api-left.html",
        right: "./steps/step2-api-right-player.html",
        help: "./help/step2-api-help.html",
        desc: "네이버 풀필먼트 계약 연동을 연결합니다."
      },
      {
        title: "N배송 프로그램 약관 동의",
        required: true,
        left: "./steps/step2-npro-left.html",
        right: "./steps/step2-npro-right-player.html",
        help: "./help/step2-npro-help.html",
        desc: "N배송 프로그램 이용을 위해 약관 동의를 완료합니다."
      }
    ]
  },
  {
    title: "STEP3. SKU 등록",
    items: [
      {
        title: "SKU 등록",
        required: true,
        left: "./steps/step3-sku-left.html",
        right: "./steps/step3-sku-right-player.html",
        help: "./help/step3-sku-help.html",
        desc: "운영 SKU 등록 기준 및 유의사항을 확인합니다."
      },
      {
        title: "상품 매핑",
        required: true,
        left: "./steps/step3-mapping-left.html",
        right: "./steps/step3-mapping-right-player.html",
        help: "./help/step3-mapping-help.html",
        desc: "등록된 SKU와 실제 판매 상품 정보를 매핑합니다."
      }
    ]
  },
  {
    title: "STEP4. 초도 입고",
    items: [
      {
        title: "입고 가이드",
        required: true,
        left: "./steps/step4-inbound-left.html",
        right: "./steps/step4-inbound-right-player.html",
        help: "./help/step4-inbound-help.html",
        desc: "초도 입고 전 준비사항과 진행 기준을 확인합니다."
      },
      {
        title: "초도 입고 패킹리스트 제출하기",
        required: true,
        left: "./steps/step4-packing-left.html",
        right: "./steps/step4-packing-right-player.html",
        help: "./help/step4-packing-help.html",
        desc: "초도 입고를 위한 패킹리스트를 작성하고 제출합니다."
      }
    ]
  },
  {
    title: "STEP5. N배송 설정하기",
    items: [
      {
        title: "N배송 설정하기",
        required: true,
        left: "./steps/step5-left.html",
        right: "./steps/step5-right-player.html",
        help: "./help/step5-help.html",
        desc: "최종적으로 N배송 설정을 완료합니다."
      }
    ]
  }
];

let step = 0;
let item = 0;
const done = {};

const sidebar = document.getElementById("sidebar");
const left = document.getElementById("left");
const title = document.getElementById("title");
const progress = document.getElementById("progress");
const helpBox = document.getElementById("helpBox");
const nextBtn = document.getElementById("nextBtn");
const helpBtn = document.getElementById("helpBtn");
const openVideoBtn = document.getElementById("openVideoBtn");
const stepDesc = document.getElementById("stepDesc");

const videoModal = document.getElementById("videoModal");
const videoModalDim = document.getElementById("videoModalDim");
const videoModalClose = document.getElementById("videoModalClose");
const videoModalTitle = document.getElementById("videoModalTitle");
const videoModalFrame = document.getElementById("videoModalFrame");

function getRequiredItems() {
  return STEPS.flatMap((s, si) =>
    s.items.map((it, ii) => ({ ...it, key: `${si}-${ii}` })).filter(it => it.required)
  );
}

function getStepStatus(si) {
  const requiredItems = STEPS[si].items
    .map((it, ii) => ({ ...it, idx: ii }))
    .filter(it => it.required);

  if (requiredItems.length === 0) return "wait";

  const doneCount = requiredItems.filter(it => done[`${si}-${it.idx}`]).length;

  if (doneCount === requiredItems.length) return "done";
  if (si === step) return "ing";
  return "wait";
}

function renderSidebar() {
  sidebar.innerHTML = "";

  STEPS.forEach((s, si) => {
    const status = getStepStatus(si);

    const el = document.createElement("div");
    el.className = `step-card ${status === "ing" ? "current" : status === "done" ? "done" : ""}`;

    el.innerHTML = `
      <div class="step-card-header">
        <div class="step-card-title">${s.title}</div>
        <span class="badge ${status}">
          ${status === "done" ? "완료" : status === "ing" ? "진행중" : "대기중"}
        </span>
      </div>
      <div class="step-items"></div>
    `;

    const itemsWrap = el.querySelector(".step-items");

    s.items.forEach((it, ii) => {
      const sub = document.createElement("div");
      sub.className = "sub-item" + (si === step && ii === item ? " active" : "");
      sub.innerHTML = `${it.title}${!it.required ? '<span class="optional">선택</span>' : ""}`;
      sub.onclick = () => {
        step = si;
        item = ii;
        render();
      };
      itemsWrap.appendChild(sub);
    });

    sidebar.appendChild(el);
  });
}

async function load(path) {
  const res = await fetch(path + "?v=" + Date.now(), { cache: "no-store" });
  if (!res.ok) throw new Error(`파일을 불러오지 못했습니다: ${path}`);
  return await res.text();
}

function bindFAQ() {
  document.querySelectorAll(".faq-q").forEach(q => {
    q.onclick = () => q.parentElement.classList.toggle("open");
  });
}

function openVideoModal(titleText, src) {
  videoModalTitle.textContent = `${titleText} 과정 영상`;
  videoModalFrame.src = `${src}?v=${Date.now()}`;
  videoModal.classList.add("open");
  document.body.classList.add("video-modal-open");
}

function closeVideoModal() {
  videoModal.classList.remove("open");
  videoModalFrame.src = "";
  document.body.classList.remove("video-modal-open");
}

function renderProgress() {
  const required = getRequiredItems();
  const total = required.length;
  const completed = required.filter(it => done[it.key]).length;
  const percent = total === 0 ? 0 : Math.floor((completed / total) * 100);
  progress.innerText = `진행률 ${percent}%`;
}

async function render() {
  closeVideoModal();
  renderSidebar();
  renderProgress();

  const data = STEPS[step].items[item];
  title.innerText = data.title;
  stepDesc.innerText = data.desc || "";

  try {
    left.innerHTML = await load(data.left);
  } catch (e) {
    left.innerHTML = `<div style="color:#ef4444;font-size:14px;">${e.message}</div>`;
  }

  openVideoBtn.onclick = () => openVideoModal(data.title, data.right);

  try {
    helpBox.innerHTML = await load(data.help);
    bindFAQ();
  } catch (e) {
    helpBox.innerHTML = `<div style="color:#ef4444;font-size:14px;">${e.message}</div>`;
  }

  const isLastStep = step === STEPS.length - 1;
  const isLastItem = item === STEPS[step].items.length - 1;

  if (isLastStep && isLastItem) {
    nextBtn.textContent = "가이드 완료";
    nextBtn.classList.add("btn-complete");
    nextBtn.classList.remove("btn-next");
  } else {
    nextBtn.textContent = "다음 단계";
    nextBtn.classList.add("btn-next");
    nextBtn.classList.remove("btn-complete");
  }
}

helpBtn.onclick = () => {
  helpBox.classList.toggle("open");
};

nextBtn.onclick = () => {
  const current = STEPS[step].items[item];

  if (current.required) {
    done[`${step}-${item}`] = true;
  }

  if (item < STEPS[step].items.length - 1) {
    item++;
    render();
    return;
  }

  if (step < STEPS.length - 1) {
    step++;
    item = 0;
    render();
    return;
  }

  render();
  alert("수고하셨습니다! 가이드 확인이 완료되었습니다.");
};

videoModalClose.addEventListener("click", closeVideoModal);
videoModalDim.addEventListener("click", closeVideoModal);

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") {
    helpBox.classList.remove("open");
    closeVideoModal();
  }
});

render();
</script>

</body>
</html>
