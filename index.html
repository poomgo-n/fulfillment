<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N배송 설정 가이드</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      background: #f4f6f8;
      color: #111;
    }

    body.drawer-open {
      overflow: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      overflow: hidden;
      border: 1px solid #e8ebf0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      padding: 24px 32px;
      border-bottom: 1px solid #edf0f4;
      background: #fff;
    }

    .logo {
      height: 36px;
      width: auto;
      display: block;
      object-fit: contain;
      flex-shrink: 0;
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      color: #111;
      line-height: 1.2;
    }

    .page-subtitle {
      margin: 0;
      font-size: 14px;
      color: #6b7280;
    }

    .step-tabs {
      display: flex;
      gap: 10px;
      padding: 20px 32px 0;
      flex-wrap: wrap;
      background: #fff;
    }

    .step-tab {
      border: 1px solid #d8dee8;
      background: #fff;
      color: #667085;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .step-tab.active {
      background: #00c73c;
      border-color: #00c73c;
      color: #fff;
    }

    .main {
      display: flex;
      gap: 0;
      min-height: calc(100vh - 220px);
      background: #fff;
    }

    .left-panel,
    .right-panel {
      width: 50%;
      min-width: 0;
    }

    .left-panel {
      padding: 32px;
      border-right: 1px solid #edf0f4;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
    }

    .right-panel {
      padding: 32px;
      background: #fafbfc;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 20px;
      overflow: hidden;
    }

    .step-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #ebfff1;
      color: #00a63a;
      font-size: 13px;
      font-weight: 800;
      width: fit-content;
    }

    .content-top {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .step-title {
      margin: 0;
      font-size: 34px;
      font-weight: 800;
      line-height: 1.25;
      color: #111;
    }

    .step-desc {
      margin: 0;
      font-size: 17px;
      line-height: 1.8;
      color: #4b5563;
      white-space: pre-line;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid #e6ebf2;
      border-radius: 18px;
      padding: 20px;
    }

    .info-box-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 800;
      color: #111;
    }

    .info-list {
      margin: 0;
      padding-left: 18px;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.8;
    }

    .info-list li + li {
      margin-top: 6px;
    }

    .bottom-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 8px;
      border-top: 1px solid #edf0f4;
    }

    .action-left,
    .action-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      font-family: 'Pretendard', sans-serif;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-prev {
      background: #eef2f6;
      color: #475467;
    }

    .btn-help {
      background: #fff;
      color: #111827;
      border: 1px solid #d8dee8;
    }

    .btn-next {
      background: #00c73c;
      color: #fff;
      min-width: 180px;
    }

    .btn-complete {
      background: #111827;
      color: #fff;
      min-width: 180px;
    }

    .carousel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .carousel-title {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      color: #111;
    }

    .carousel-count {
      font-size: 13px;
      color: #667085;
      font-weight: 700;
    }

    .carousel-stage {
      position: relative;
      flex: 1;
      min-height: 540px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 24px;
    }

    .slide-image {
      width: 100%;
      height: 100%;
      max-height: 620px;
      object-fit: contain;
      object-position: center;
      display: block;
      border-radius: 14px;
      background: #fff;
    }

    .carousel-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .arrow-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid #d8dee8;
      background: #fff;
      color: #111;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
    }

    .thumbs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .thumb {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #d0d5dd;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .thumb.active {
      width: 28px;
      background: #00c73c;
    }

    .help-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 40;
    }

    .help-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .help-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(440px, 100%);
      height: 100vh;
      background: #fff;
      box-shadow: -10px 0 30px rgba(0,0,0,0.12);
      transform: translateX(100%);
      transition: transform 0.28s ease;
      z-index: 50;
      display: flex;
      flex-direction: column;
    }

    .help-drawer.open {
      transform: translateX(0);
    }

    .help-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 24px 24px 18px;
      border-bottom: 1px solid #edf0f4;
    }

    .help-header h3 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      color: #111;
    }

    .help-header p {
      margin: 6px 0 0;
      font-size: 14px;
      color: #667085;
      line-height: 1.6;
    }

    .help-close {
      border: none;
      background: #f3f4f6;
      color: #111;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 20px;
      flex-shrink: 0;
    }

    .help-body {
      padding: 22px 24px 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .help-card {
      border: 1px solid #e6ebf2;
      border-radius: 16px;
      padding: 16px 16px 14px;
      background: #fafcff;
    }

    .help-card-title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 800;
      color: #111827;
    }

    .help-card-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.8;
      color: #4b5563;
      white-space: pre-line;
    }

    .empty-image {
      font-size: 14px;
      color: #98a2b3;
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .main {
        flex-direction: column;
        min-height: auto;
      }

      .left-panel,
      .right-panel {
        width: 100%;
      }

      .left-panel {
        border-right: none;
        border-bottom: 1px solid #edf0f4;
      }

      .carousel-stage {
        min-height: 420px;
      }
    }

    @media (max-width: 768px) {
      .page {
        padding: 12px;
      }

      .header,
      .step-tabs {
        padding-left: 18px;
        padding-right: 18px;
      }

      .left-panel,
      .right-panel {
        padding: 20px 18px;
      }

      .page-title {
        font-size: 22px;
      }

      .step-title {
        font-size: 26px;
      }

      .bottom-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .action-left,
      .action-right {
        width: 100%;
      }

      .btn-prev,
      .btn-help,
      .btn-next,
      .btn-complete {
        width: 100%;
        justify-content: center;
      }

      .carousel-stage {
        min-height: 320px;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <header class="header">
        <img src="Primary Logo.png" alt="품고 로고" class="logo" onerror="this.style.display='none'">
        <div class="title-wrap">
          <h1 class="page-title">N배송 설정 가이드</h1>
          <p class="page-subtitle">판매처 등록부터 N배송 프로그램 이용까지 단계별로 확인해주세요.</p>
        </div>
      </header>

      <div class="step-tabs" id="stepTabs"></div>

      <main class="main">
        <section class="left-panel">
          <div class="content-top">
            <div class="step-badge" id="stepBadge">STEP 1</div>
            <h2 class="step-title" id="stepTitle"></h2>
            <p class="step-desc" id="stepDesc"></p>

            <div class="info-box">
              <h3 class="info-box-title">진행 내용</h3>
              <ul class="info-list" id="stepBullets"></ul>
            </div>
          </div>

          <div class="bottom-actions">
            <div class="action-left">
              <button class="btn btn-prev" id="prevBtn">이전 단계</button>
              <button class="btn btn-help" id="helpBtn">도움말</button>
            </div>
            <div class="action-right">
              <button class="btn btn-next" id="nextBtn">다음 단계</button>
            </div>
          </div>
        </section>

        <section class="right-panel">
          <div class="carousel-header">
            <h3 class="carousel-title" id="carouselTitle">화면 예시</h3>
            <span class="carousel-count" id="carouselCount">1 / 1</span>
          </div>

          <div class="carousel-stage" id="carouselStage">
            <img id="slideImage" class="slide-image" src="" alt="">
            <div id="emptyImage" class="empty-image" style="display:none;">
              등록된 이미지가 없습니다.<br>
              step 데이터에 이미지 경로를 추가해주세요.
            </div>
          </div>

          <div class="carousel-controls">
            <button class="arrow-btn" id="prevImageBtn" aria-label="이전 이미지">&lt;</button>
            <div class="thumbs" id="thumbs"></div>
            <button class="arrow-btn" id="nextImageBtn" aria-label="다음 이미지">&gt;</button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="help-overlay" id="helpOverlay"></div>

  <aside class="help-drawer" id="helpDrawer" aria-hidden="true">
    <div class="help-header">
      <div>
        <h3 id="helpTitle">도움말</h3>
        <p id="helpSubtitle">현재 단계에서 자주 확인하는 내용을 안내드립니다.</p>
      </div>
      <button class="help-close" id="helpClose" aria-label="도움말 닫기">×</button>
    </div>
    <div class="help-body" id="helpBody"></div>
  </aside>

  <script>
    const guideSteps = [
      {
        id: 1,
        tab: "판매처 등록",
        badge: "STEP 1",
        title: "판매처 등록",
        desc: "풀필먼트 연동을 진행하기 전, 품고 나우에 스마트스토어 판매처 계정을 먼저 등록해야 합니다.\n판매처명, 브랜드명, 연동 계정을 정확하게 입력해야 이후 단계가 정상적으로 진행됩니다.",
        bullets: [
          "품고 나우 > 주문 > 판매처 계정 > 판매처 계정 개별 등록으로 이동합니다.",
          "판매처명은 스마트스토어(물류사)로 설정합니다.",
          "브랜드명은 조회되는 브랜드명으로 선택합니다.",
          "연동 계정에는 스마트스토어 API 연동용 판매자 ID를 입력합니다."
        ],
        images: [
          "./assets/step1-1.png",
          "./assets/step1-2.png"
        ],
        helpTitle: "판매처 등록 도움말",
        helpSubtitle: "판매처 계정 등록 시 자주 헷갈리는 항목을 정리했습니다.",
        help: [
          {
            title: "연동 계정은 무엇을 넣나요?",
            text: "스마트스토어 센터 > 스토어 관리 > 서비스 연결 > API 관리 메뉴에서 확인 가능한 API 연동용 판매자 ID를 입력해주세요."
          },
          {
            title: "브랜드명이 안 보일 때",
            text: "품고 나우 내 브랜드 정보가 먼저 생성되어 있어야 조회됩니다. 조회되지 않으면 내부 브랜드 생성 여부를 먼저 확인해주세요."
          },
          {
            title: "판매처명 입력 기준",
            text: "임의 명칭이 아니라 반드시 스마트스토어(물류사) 기준으로 등록해야 이후 연동 단계에서 혼선이 없습니다."
          }
        ]
      },
      {
        id: 2,
        tab: "풀필먼트 연동",
        badge: "STEP 2",
        title: "풀필먼트 연동",
        desc: "스마트스토어 내 네이버 서비스 연결 메뉴에서 품고를 선택하고, 정보 제공 동의까지 완료해주세요.\n동의가 완료된 이후 자동으로 연동 상태가 변경됩니다.",
        bullets: [
          "스마트스토어 > 스토어 관리 > 네이버 서비스 연결 > 네이버 풀필먼트로 이동합니다.",
          "물류사 목록에서 품고를 선택합니다.",
          "풀필먼트 계약 연동 버튼을 클릭합니다.",
          "필수 동의 항목을 모두 체크한 뒤 확인합니다."
        ],
        images: [
          "./assets/step2-1.png",
          "./assets/step2-2.png",
          "./assets/step2-3.png"
        ],
        helpTitle: "풀필먼트 연동 도움말",
        helpSubtitle: "품고 선택과 동의 단계에서 자주 묻는 내용을 정리했습니다.",
        help: [
          {
            title: "연동 상태는 언제 바뀌나요?",
            text: "동의가 완료된 시점 기준 익일 00:40 이후 자동으로 확인중에서 연동됨으로 변경됩니다."
          },
          {
            title: "품고 외 다른 물류사를 선택하면 안 되나요?",
            text: "현재 운영 예정 물류사가 품고라면 반드시 품고를 선택해야 하며, 다른 물류사 선택 시 이후 N배송 설정이 맞지 않게 진행될 수 있습니다."
          },
          {
            title: "동의 이후 바로 다음 단계 진행해도 되나요?",
            text: "연동 상태가 실제로 연동됨으로 바뀐 뒤 다음 단계로 넘어가는 것이 가장 안전합니다."
          }
        ]
      },
      {
        id: 3,
        tab: "N배송 프로그램 이용",
        badge: "STEP 3",
        title: "N배송 프로그램 이용",
        desc: "판매처 등록과 풀필먼트 연동이 모두 완료되었다면, 마지막으로 N배송 프로그램 이용 여부를 설정해주세요.\n물류사가 품고로 선택되어 있는지 다시 한 번 확인한 뒤 변경을 완료합니다.",
        bullets: [
          "스마트스토어 > N배송 관리 > N배송 프로그램 이용 메뉴로 이동합니다.",
          "판매처 등록 완료 여부를 확인합니다.",
          "풀필먼트 연동 상태가 연동됨인지 확인합니다.",
          "물류사가 품고로 설정되어 있는지 확인 후 이용으로 변경합니다."
        ],
        images: [
          "./assets/step3-1.png",
          "./assets/step3-2.png"
        ],
        helpTitle: "N배송 프로그램 이용 도움말",
        helpSubtitle: "최종 설정 전 꼭 확인해야 하는 체크 포인트입니다.",
        help: [
          {
            title: "이용으로 변경이 안 될 때",
            text: "판매처 등록 또는 풀필먼트 연동이 정상 완료되지 않은 경우 이용 설정이 제한될 수 있습니다."
          },
          {
            title: "물류사 확인이 중요한 이유",
            text: "물류사가 품고가 아닌 상태에서 진행하면 실제 운영 정보와 스마트스토어 설정이 달라질 수 있습니다."
          },
          {
            title: "마지막 점검 포인트",
            text: "판매처 등록 완료, 풀필먼트 연동됨, 물류사 품고, N배송 프로그램 이용 체크 여부를 순서대로 확인해주세요."
          }
        ]
      }
    ];

    let currentStepIndex = 0;
    let currentImageIndex = 0;

    const stepTabs = document.getElementById("stepTabs");
    const stepBadge = document.getElementById("stepBadge");
    const stepTitle = document.getElementById("stepTitle");
    const stepDesc = document.getElementById("stepDesc");
    const stepBullets = document.getElementById("stepBullets");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    const carouselTitle = document.getElementById("carouselTitle");
    const carouselCount = document.getElementById("carouselCount");
    const slideImage = document.getElementById("slideImage");
    const emptyImage = document.getElementById("emptyImage");
    const thumbs = document.getElementById("thumbs");
    const prevImageBtn = document.getElementById("prevImageBtn");
    const nextImageBtn = document.getElementById("nextImageBtn");

    const helpBtn = document.getElementById("helpBtn");
    const helpOverlay = document.getElementById("helpOverlay");
    const helpDrawer = document.getElementById("helpDrawer");
    const helpClose = document.getElementById("helpClose");
    const helpTitle = document.getElementById("helpTitle");
    const helpSubtitle = document.getElementById("helpSubtitle");
    const helpBody = document.getElementById("helpBody");

    function renderTabs() {
      stepTabs.innerHTML = "";
      guideSteps.forEach((step, index) => {
        const btn = document.createElement("button");
        btn.className = "step-tab" + (index === currentStepIndex ? " active" : "");
        btn.textContent = `${step.id}. ${step.tab}`;
        btn.addEventListener("click", () => {
          currentStepIndex = index;
          currentImageIndex = 0;
          renderStep();
        });
        stepTabs.appendChild(btn);
      });
    }

    function renderBullets(items) {
      stepBullets.innerHTML = "";
      items.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        stepBullets.appendChild(li);
      });
    }

    function renderCarousel(images, title) {
      carouselTitle.textContent = `${title} 화면 예시`;
      thumbs.innerHTML = "";

      if (!images || images.length === 0) {
        slideImage.style.display = "none";
        emptyImage.style.display = "block";
        carouselCount.textContent = "0 / 0";
        prevImageBtn.disabled = true;
        nextImageBtn.disabled = true;
        return;
      }

      slideImage.style.display = "block";
      emptyImage.style.display = "none";
      slideImage.src = images[currentImageIndex];
      slideImage.alt = `${title} 예시 이미지 ${currentImageIndex + 1}`;
      carouselCount.textContent = `${currentImageIndex + 1} / ${images.length}`;

      images.forEach((_, index) => {
        const dot = document.createElement("button");
        dot.className = "thumb" + (index === currentImageIndex ? " active" : "");
        dot.addEventListener("click", () => {
          currentImageIndex = index;
          renderCarousel(images, title);
        });
        thumbs.appendChild(dot);
      });

      prevImageBtn.disabled = images.length <= 1;
      nextImageBtn.disabled = images.length <= 1;
    }

    function renderHelp(step) {
      helpTitle.textContent = step.helpTitle;
      helpSubtitle.textContent = step.helpSubtitle;
      helpBody.innerHTML = "";

      step.help.forEach(item => {
        const card = document.createElement("div");
        card.className = "help-card";

        const h4 = document.createElement("h4");
        h4.className = "help-card-title";
        h4.textContent = item.title;

        const p = document.createElement("p");
        p.className = "help-card-text";
        p.textContent = item.text;

        card.appendChild(h4);
        card.appendChild(p);
        helpBody.appendChild(card);
      });
    }

    function renderStep() {
      const step = guideSteps[currentStepIndex];

      renderTabs();

      stepBadge.textContent = step.badge;
      stepTitle.textContent = step.title;
      stepDesc.textContent = step.desc;
      renderBullets(step.bullets);

      if (currentImageIndex >= step.images.length) {
        currentImageIndex = 0;
      }
      renderCarousel(step.images, step.title);
      renderHelp(step);

      prevBtn.style.visibility = currentStepIndex === 0 ? "hidden" : "visible";

      if (currentStepIndex === guideSteps.length - 1) {
        nextBtn.textContent = "가이드 완료";
        nextBtn.classList.remove("btn-next");
        nextBtn.classList.add("btn-complete");
      } else {
        nextBtn.textContent = "다음 단계";
        nextBtn.classList.remove("btn-complete");
        nextBtn.classList.add("btn-next");
      }
    }

    function goPrevStep() {
      if (currentStepIndex > 0) {
        currentStepIndex -= 1;
        currentImageIndex = 0;
        renderStep();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function goNextStep() {
      if (currentStepIndex < guideSteps.length - 1) {
        currentStepIndex += 1;
        currentImageIndex = 0;
        renderStep();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else {
        alert("수고하셨습니다! 모든 가이드 확인이 완료되었습니다.");
      }
    }

    function showPrevImage() {
      const images = guideSteps[currentStepIndex].images;
      if (!images || images.length <= 1) return;
      currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
      renderCarousel(images, guideSteps[currentStepIndex].title);
    }

    function showNextImage() {
      const images = guideSteps[currentStepIndex].images;
      if (!images || images.length <= 1) return;
      currentImageIndex = (currentImageIndex + 1) % images.length;
      renderCarousel(images, guideSteps[currentStepIndex].title);
    }

    function openHelp() {
      helpOverlay.classList.add("open");
      helpDrawer.classList.add("open");
      helpDrawer.setAttribute("aria-hidden", "false");
      document.body.classList.add("drawer-open");
    }

    function closeHelp() {
      helpOverlay.classList.remove("open");
      helpDrawer.classList.remove("open");
      helpDrawer.setAttribute("aria-hidden", "true");
      document.body.classList.remove("drawer-open");
    }

    prevBtn.addEventListener("click", goPrevStep);
    nextBtn.addEventListener("click", goNextStep);
    prevImageBtn.addEventListener("click", showPrevImage);
    nextImageBtn.addEventListener("click", showNextImage);

    helpBtn.addEventListener("click", openHelp);
    helpClose.addEventListener("click", closeHelp);
    helpOverlay.addEventListener("click", closeHelp);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeHelp();
      if (e.key === "ArrowLeft") showPrevImage();
      if (e.key === "ArrowRight") showNextImage();
    });

    renderStep();
  </script>
</body>
</html>
