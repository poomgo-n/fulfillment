<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N배송 설정 가이드</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <div class="app-shell">
      <header class="app-header">
        <img src="./Primary Logo.png" alt="품고 로고" class="app-logo" onerror="this.style.display='none'">
        <div class="app-title-wrap">
          <h1 class="app-title">N배송 설정 가이드</h1>
          <p class="app-subtitle">단계별 설정 화면과 도움말을 확인해주세요.</p>
        </div>
      </header>

      <section class="progress-section">
        <div class="progress-header">
          <div>
            <p class="progress-label">진행률</p>
            <h2 class="progress-title" id="progressTitle">STEP 1 진행 중</h2>
          </div>
          <div class="progress-meta" id="progressMeta">1 / 3</div>
        </div>

        <div class="progress-track" id="progressTrack"></div>
      </section>

      <main class="guide-layout">
        <section class="guide-left">
          <div class="panel-head">
            <div>
              <div class="panel-kicker" id="stepKicker">STEP 1</div>
              <h2 class="panel-title" id="stepTitle">품고 나우 로그인하기</h2>
            </div>
          </div>

          <div class="panel-body" id="leftContent">
            <div class="loading-box">설명 화면을 불러오는 중입니다...</div>
          </div>

          <div class="panel-footer">
            <div class="footer-left">
              <button class="btn btn-secondary" id="prevStepBtn">이전 단계</button>
              <button class="btn btn-outline" id="helpBtn">도움말</button>
            </div>
            <div class="footer-right">
              <button class="btn btn-primary" id="nextStepBtn">다음 단계</button>
            </div>
          </div>
        </section>

        <section class="guide-right">
          <div class="panel-head panel-head-right">
            <div>
              <div class="panel-kicker">화면 예시</div>
              <h2 class="panel-title" id="slideTitle">화면 1</h2>
            </div>

            <div class="slide-toolbar">
              <button class="icon-btn" id="prevSlideBtn" aria-label="이전 화면">&lt;</button>
              <span class="slide-count" id="slideCount">1 / 1</span>
              <button class="icon-btn" id="nextSlideBtn" aria-label="다음 화면">&gt;</button>
            </div>
          </div>

          <div class="slide-stage" id="rightContent">
            <div class="loading-box">화면 예시를 불러오는 중입니다...</div>
          </div>

          <div class="slide-dots" id="slideDots"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <aside class="help-drawer" id="helpDrawer" aria-hidden="true">
    <div class="help-drawer-header">
      <div>
        <div class="drawer-kicker">도움말</div>
        <h3 class="drawer-title" id="drawerTitle">현재 단계 도움말</h3>
      </div>
      <button class="icon-btn close-btn" id="closeHelpBtn" aria-label="도움말 닫기">×</button>
    </div>

    <div class="help-drawer-body" id="helpContent">
      <div class="loading-box">도움말을 불러오는 중입니다...</div>
    </div>
  </aside>

  <script src="./script.js"></script>
</body>
</html>
