<div class="faq-list">

  <div class="faq-item open">
    <div class="faq-q">스마트스토어(물류사)를 어떻게 설정하나요?</div>
    <div class="faq-a">
      <p>
        판매처명 드롭다운을 클릭하여 텍스트로<strong>스마트스토어(물류사)</strong>를 입력합니다.<br>
        전체 목록에서 선택하지 않고, 바로 스마트스토어(물류사)를 선택할 수 있어요.
      </p>
    </div>
  </div>

  <div class="faq-item">
    <div class="faq-q">판매처명을 잘못 선택했어요.</div>
    <div class="faq-a">
      <ul>
        <li>판매처 계정 목록에서 상세 클릭해주세요.</li>
        <li>정보 변경을 클릭해주세요.</li>
        <li>판매처명 스마트스토어(물류사)로 선택 후 저장 클릭해주세요.</li>
      </ul>
    </div>
  </div>

</div>
