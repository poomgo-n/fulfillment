<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구성원 등록 과정 영상</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f1f3f5;
    }

    body {
      margin: 0;
    }

    .player-stage {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f1f3f5;
      position: relative;
    }

    .guide-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f1f3f5;
      cursor: default;
    }

    .guide-container.is-panning {
      cursor: grabbing;
    }

    .guide-canvas {
      width: 1200px;
      height: 850px;
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
      overflow: hidden;
      user-select: none;
    }

    .zoom-controls {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 3000;
      display: flex;
      gap: 8px;
    }

    .zoom-controls button {
      height: 36px;
      min-width: 36px;
      padding: 0 14px;
      border: 1px solid #dbe3ef;
      background: rgba(255, 255, 255, 0.96);
      color: #111827;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .zoom-controls button:hover {
      background: #f8fbff;
    }

    #click-hint {
      position: absolute;
      background: #0040D1;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 4px;
      z-index: 10000;
      pointer-events: none;
      display: none;
      box-shadow: 0 4px 10px rgba(0,64,209,0.3);
      animation: hintBounce 1s infinite;
    }

    @keyframes hintBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .target-highlight {
      outline: 3px solid #0040D1 !important;
      outline-offset: 2px;
      transition: outline 0.2s;
      border-radius: 4px;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.92);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .play-overlay.hidden {
      display: none;
    }

    .btn-start {
      background: #0040D1;
      color: #fff;
      border: none;
      padding: 20px 45px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,64,209,0.24);
    }

    .btn-start:hover {
      filter: brightness(0.98);
    }

    .main-shell {
      display: flex;
      height: 100%;
    }

    .sidebar {
      width: 280px;
      background: #fff;
      border-right: 1px solid #e9ecef;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-header {
      height: 40px;
    }

    .menu-title {
      font-size: 13px;
      color: #adb5bd;
      padding: 25px 24px 10px;
      font-weight: 700;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      color: #495057;
      font-size: 15px;
      width: 100%;
      cursor: default;
    }

    .menu-icon {
      margin-right: 12px;
      width: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .menu-arrow {
      font-size: 10px;
      color: #adb5bd;
      margin-right: 8px;
      font-style: normal;
      width: 10px;
      text-align: center;
    }

    .sub-menu-list {
      width: 100%;
    }

    .sub-item {
      padding: 10px 24px 10px 62px;
      font-size: 14px;
      color: #495057;
      display: block;
      width: 100%;
      cursor: default;
    }

    .sub-item.active-sub {
      color: #0040D1;
      font-weight: 700;
      background: #f0f4ff;
      border-radius: 0 24px 24px 0;
      width: calc(100% - 15px);
    }

    .content-area {
      flex: 1;
      padding: 50px;
      background: #fff;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      width: 100%;
    }

    .btn-add-main {
      background: #f8faff;
      border: 1px solid #e9ecef;
      color: #0040D1;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 700;
      cursor: default;
    }

    .member-list {
      border-top: 1px solid #eee;
      width: 100%;
    }

    .member-item {
      display: flex;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #f1f3f5;
    }

    .avatar-circle {
      width: 48px;
      height: 48px;
      background: #e9ecef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #868e96;
      margin-right: 18px;
      font-size: 14px;
    }

    #new-row {
      display: none;
      opacity: 0;
      border-radius: 8px;
    }

    #new-row.active-row {
      display: flex;
      opacity: 1;
      animation: successFlash 2.5s ease-out;
    }

    @keyframes successFlash {
      0%, 100% { box-shadow: 0 0 0 0px transparent; }
      50% { box-shadow: 0 0 0 5px #0040D1; background: #f8faff; }
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      transform: translateY(100%);
      transition: transform 0.6s ease;
      z-index: 1000;
    }

    .overlay.active {
      transform: translateY(0);
    }

    .overlay-header {
      display: flex;
      align-items: center;
      padding: 20px 30px;
      border-bottom: 1px solid #f1f3f5;
      justify-content: space-between;
    }

    .pop-profile-icon {
      width: 120px;
      height: 120px;
      background: #e9ecef;
      border-radius: 50%;
      margin: 40px auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #868e96;
      font-weight: 700;
    }

    .form-card {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 40px;
      background: #fff;
    }

    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 25px;
    }

    .form-row label {
      width: 120px;
      font-size: 15px;
      font-weight: 700;
      color: #333;
    }

    .form-input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    .form-input.typing {
      border-color: #0040D1;
      background: #f8faff;
    }

    .btn-check-duplicate {
      margin-left: 10px;
      padding: 0 20px;
      height: 48px;
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      color: #adb5bd;
      font-size: 14px;
      font-weight: 700;
    }

    .btn-submit-pop {
      background: #0040D1;
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 6px;
      font-weight: 700;
      cursor: default;
    }
  </style>
</head>

  <script>
    const BASE_WIDTH = 1200;
    const BASE_HEIGHT = 850;

    let fitScale = 1;
    let currentScale = 1;
    let offsetX = 0;
    let offsetY = 0;

    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;
    let panOriginX = 0;
    let panOriginY = 0;

    const hint = document.getElementById('click-hint');
    const overlay = document.getElementById('addOverlay');
    const playOverlay = document.getElementById('playOverlay');
    const startBtn = document.getElementById('startBtn');

    const guideCanvas = document.getElementById('guideCanvas');
    const playerStage = document.getElementById('playerStage');
    const guideContainer = document.getElementById('guideContainer');

    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomResetBtn = document.getElementById('zoomResetBtn');

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function clampOffsets() {
      const stageWidth = playerStage.clientWidth;
      const stageHeight = playerStage.clientHeight;

      const scaledWidth = BASE_WIDTH * currentScale;
      const scaledHeight = BASE_HEIGHT * currentScale;

      if (scaledWidth <= stageWidth) {
        offsetX = (stageWidth - scaledWidth) / 2;
      } else {
        const minX = stageWidth - scaledWidth;
        const maxX = 0;
        offsetX = Math.min(maxX, Math.max(minX, offsetX));
      }

      if (scaledHeight <= stageHeight) {
        offsetY = (stageHeight - scaledHeight) / 2;
      } else {
        const minY = stageHeight - scaledHeight;
        const maxY = 0;
        offsetY = Math.min(maxY, Math.max(minY, offsetY));
      }
    }

    function applyCanvasTransform() {
      clampOffsets();
      guideCanvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${currentScale})`;
    }

    function fitGuideToFrame() {
      const stageWidth = playerStage.clientWidth;
      const stageHeight = playerStage.clientHeight;

      fitScale = Math.min(stageWidth / BASE_WIDTH, stageHeight / BASE_HEIGHT);
      currentScale = fitScale;

      const scaledWidth = BASE_WIDTH * currentScale;
      const scaledHeight = BASE_HEIGHT * currentScale;

      offsetX = (stageWidth - scaledWidth) / 2;
      offsetY = (stageHeight - scaledHeight) / 2;

      applyCanvasTransform();
    }

    function zoomTo(nextScale, centerX = null, centerY = null) {
      const prevScale = currentScale;
      const clampedScale = Math.max(fitScale, Math.min(3, nextScale));

      if (clampedScale === currentScale) return;

      const rect = playerStage.getBoundingClientRect();
      const cx = centerX ?? (rect.width / 2);
      const cy = centerY ?? (rect.height / 2);

      const worldX = (cx - offsetX) / prevScale;
      const worldY = (cy - offsetY) / prevScale;

      currentScale = clampedScale;
      offsetX = cx - (worldX * currentScale);
      offsetY = cy - (worldY * currentScale);

      applyCanvasTransform();
    }

    function resetZoom() {
      fitGuideToFrame();
    }

    async function showClickAction(targetId, waitTime = 3000) {
      const target = document.getElementById(targetId);
      if (!target || !guideCanvas) return;

      const targetRect = target.getBoundingClientRect();
      const canvasRect = guideCanvas.getBoundingClientRect();

      target.classList.add('target-highlight');

      const x = (targetRect.left - canvasRect.left + (targetRect.width / 2)) / currentScale;
      const y = (targetRect.top - canvasRect.top) / currentScale;

      hint.style.display = 'block';
      hint.style.left = `${x + 20}px`;
      hint.style.top = `${y - 15}px`;

      await sleep(waitTime);

      target.classList.remove('target-highlight');
      hint.style.display = 'none';
    }

    function resetForm() {
      document.getElementById('ani-name').value = '';
      document.getElementById('ani-email').value = '';
      document.getElementById('ani-phone').value = '';

      const cBtn = document.getElementById('target-check');
      cBtn.innerText = '중복 확인';
      cBtn.style.color = '#adb5bd';
      cBtn.style.background = '#f8f9fa';

      document.getElementById('new-row').classList.remove('active-row');
      overlay.classList.remove('active');
      hint.style.display = 'none';
    }

    function typeEffect(id, text) {
      return new Promise(resolve => {
        const el = document.getElementById(id);
        el.value = '';
        el.classList.add('typing');

        let i = 0;
        const timer = setInterval(() => {
          el.value += text[i];
          i += 1;

          if (i === text.length) {
            clearInterval(timer);
            el.classList.remove('typing');
            resolve();
          }
        }, 60);
      });
    }

    async function runFullProcess() {
      resetZoom();
      playOverlay.classList.add('hidden');
      resetForm();

      await showClickAction('nav-reg', 1500);
      await showClickAction('nav-member', 1500);
      await showClickAction('target-add-btn', 3000);

      overlay.classList.add('active');
      await sleep(1500);

      await typeEffect('ani-name', '품고');
      await sleep(500);
      await typeEffect('ani-email', 'poomgo@dohands.com');

      const cBtn = document.getElementById('target-check');
      cBtn.style.color = '#333';
      cBtn.style.background = '#fff';

      await showClickAction('target-check', 3000);

      cBtn.innerText = '확인됨';
      cBtn.style.color = '#adb5bd';
      cBtn.style.background = '#eee';

      await sleep(500);
      await typeEffect('ani-phone', '010-1234-1234');
      await showClickAction('target-submit', 3000);

      overlay.classList.remove('active');
      await sleep(1000);
      document.getElementById('new-row').classList.add('active-row');

      await sleep(5000);
      playOverlay.classList.remove('hidden');
    }

    function onPointerDown(e) {
      if (currentScale <= fitScale) return;
      if (e.target.closest('.zoom-controls')) return;
      if (e.target.closest('.btn-start')) return;

      isPanning = true;
      panStartX = e.clientX;
      panStartY = e.clientY;
      panOriginX = offsetX;
      panOriginY = offsetY;
      guideContainer.classList.add('is-panning');
    }

    function onPointerMove(e) {
      if (!isPanning) return;

      const dx = e.clientX - panStartX;
      const dy = e.clientY - panStartY;

      offsetX = panOriginX + dx;
      offsetY = panOriginY + dy;
      applyCanvasTransform();
    }

    function onPointerUp() {
      isPanning = false;
      guideContainer.classList.remove('is-panning');
    }

    zoomInBtn.addEventListener('click', () => {
      const rect = playerStage.getBoundingClientRect();
      zoomTo(currentScale + 0.15, rect.width / 2, rect.height / 2);
    });

    zoomOutBtn.addEventListener('click', () => {
      const rect = playerStage.getBoundingClientRect();
      zoomTo(currentScale - 0.15, rect.width / 2, rect.height / 2);
    });

    zoomResetBtn.addEventListener('click', resetZoom);

    guideContainer.addEventListener('wheel', (e) => {
      e.preventDefault();

      const rect = playerStage.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const delta = e.deltaY < 0 ? 0.12 : -0.12;
      zoomTo(currentScale + delta, x, y);
    }, { passive: false });

    guideContainer.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerUp);

    startBtn.addEventListener('click', runFullProcess);
    window.addEventListener('load', fitGuideToFrame);
    window.addEventListener('resize', fitGuideToFrame);
  </script>
</body>
</html>
