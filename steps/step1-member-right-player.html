<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 스마트스토어센터 - 풀필먼트 연동 가이드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* 가이드 시스템 제어용 - 원본 스타일과 절대 충돌하지 않도록 설정 */
        .g-container { position: relative; width: 100%; height: 100vh; overflow: hidden; }
        .g-step { display: none; width: 100%; height: 100%; }
        .g-step.active { display: block; }
        
        /* 시작 버튼 오버레이 */
        .g-overlay { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.98); z-index: 9999999; display: flex; justify-content: center; align-items: center; }
        .g-overlay.hidden { display: none; }
        .g-btn-start { background: #1a6dff; color: #fff; border: none; padding: 25px 60px; border-radius: 60px; font-size: 24px; font-weight: 700; cursor: pointer; }

        /* [파일 1, 2, 3 원본 스타일 100% 무삭제 복제] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #ffffff; color: #333; overflow: hidden; }
        @keyframes bouncePulse { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        .click-badge { background-color: #1a6dff; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: bold; display: none; margin-left: 6px; animation: bouncePulse 1s infinite ease-in-out; }
        .active-badge { display: inline-block !important; }

        /* 파일 1 원본 CSS */
        .navbar { height: 56px; background-color: #2b303b; display: flex; align-items: center; padding: 0 24px; color: #a4a9b0; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid #1a1e25; }
        .sidebar { width: 250px; background-color: #353b45; color: #d1d4d9; overflow-y: hidden; display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid #2b303b; }
        .sidebar-item-main { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; font-size: 14px; font-weight: bold; cursor: pointer; border-bottom: 1px solid #414753; }
        .service-connect-btn { background-color: #272c36; border-radius: 6px; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; color: #00c73c; font-size: 13px; font-weight: bold; cursor: pointer; }
        .main-content { flex: 1; padding: 0; background-color: #ffffff; overflow-y: auto; }
        .content-row { display: flex; border-bottom: 1px solid #f1f3f5; padding: 30px 40px; }
        .inner-box { background-color: #f8f9fa; border-top: 1px solid #f1f3f5; border-bottom: 1px solid #f1f3f5; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
        .btn-fulfillment { margin-top: 15px; padding: 10px 20px; background-color: #ffffff; border: 2px solid #1a6dff; border-radius: 6px; font-size: 13px; font-weight: bold; color: #333; display: inline-flex; align-items: center; cursor: pointer; }

        /* 파일 2 & 3 모달 원본 CSS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-container { width: 600px; background-color: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .modal-header { background-color: #00c73c; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .row-active { border: 2px solid #748ffc !important; border-radius: 4px; background-color: #f8fbff; margin: -1px 0; position: relative; z-index: 2; }
        .all-agree-box { margin-top: 15px; padding: 12px 15px; border: 2px solid #748ffc; border-radius: 6px; background-color: #f8fbff; display: flex; align-items: center; font-size: 14px; font-weight: bold; gap: 10px; }
        .btn-confirm { padding: 10px 40px; border: none; background-color: #00c73c; color: white; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; }
    </style>
</head>
<body>

<div class="g-container">
    <div class="g-overlay" id="startOverlay"><button class="g-btn-start" onclick="run()">가이드 영상 시작 ▶</button></div>

    <div id="s1" class="g-step active">
        <div class="navbar">
            <div class="navbar-left">
                <div class="navbar-logo" style="color:white; font-size:18px; font-weight:bold; width:220px;"><span style="color:#00c73c; font-weight:900; font-size:20px;">N</span> 스마트스토어센터</div>
                <div style="display:flex; gap:20px; font-size:13px; color:#a4a9b0;">
                    <span style="color:white; font-weight:bold;">쇼핑파트너센터</span><span>커머스솔루션마켓</span><span>통합광고주센터</span>
                </div>
            </div>
            <div class="navbar-right"><span style="border:1px solid #666; border-radius:12px; padding:3px 10px; color:#ccc; font-size:11px;">내정보</span></div>
        </div>
        <div style="display:flex; height: calc(100% - 56px);">
            <aside class="sidebar">
                <div class="sidebar-item-main">상품관리 <span style="background:#fa5252; color:white; font-size:10px; padding:1px 4px; border-radius:8px;">N</span> ∨</div>
                <div class="sidebar-item-main">판매관리 <span style="color:white; font-size:12px; font-weight:900;">N pay</span> ∨</div>
                <div class="sidebar-item-main" style="color:#f7d47e; border-bottom:none;">스토어관리 ∧</div>
                <div style="background-color: #3f4551; flex: 1;">
                    <div style="padding:20px 20px 10px; font-size:12px; color:#8f96a1;">서비스 연결</div>
                    <div style="padding: 5px 15px;" id="b1-1">
                        <div class="service-connect-btn">네이버 서비스 연결 <span class="click-badge">클릭</span></div>
                    </div>
                </div>
            </aside>
            <main class="main-content">
                <div class="content-row">
                    <div style="width:180px; font-weight:bold; font-size:15px;">광고관리 ></div>
                    <div style="flex:1;"><div style="font-size:13px; color:#495057; margin-bottom:15px;">네이버 쇼핑 연동 완료 후 설정 가능합니다.</div></div>
                </div>
                <div class="content-row" style="border-bottom:none;">
                    <div style="width:180px; font-weight:bold; font-size:15px;">네이버 풀필먼트 ></div>
                    <div style="flex:1;">
                        <div style="font-size:13px; color:#1a6dff; margin-bottom:15px;">이용 중인 판매자라면 풀필먼트 계약 연동 버튼을 클릭하세요.</div>
                        <div id="b1-2"><button class="btn-fulfillment">풀필먼트 계약 연동 <span class="click-badge">클릭</span></button></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="s2" class="g-step">
        <div class="modal-overlay">
            <div class="modal-container">
                <div class="modal-header"><h2>풀필먼트 계약 연동</h2><button style="background:none; border:none; color:white; font-size:20px;">✕</button></div>
                <div style="padding:20px;">
                    <div class="row-active" id="b2-1" style="display:flex; padding:12px 10px; align-items:center; border-bottom:1px solid #f1f3f5;">
                        <div style="width:40px;"><input type="checkbox" checked></div>
                        <div style="flex:1; font-weight:bold;">품고 <span class="click-badge">선택됨!</span></div>
                    </div>
                </div>
                <div style="padding:15px 20px; display:flex; justify-content:center; background:#fafafa; border-top:1px solid #dee2e6;" id="b2-2">
                    <button class="btn-confirm">확인 <span class="click-badge" style="background:#0040d1; margin-left:10px;">클릭</span></button>
                </div>
            </div>
        </div>
    </div>

    <div id="s3" class="g-step">
        <div class="modal-overlay">
            <div class="modal-container" style="width:650px;">
                <div class="modal-header"><h2>풀필먼트 연동 정보 제공 동의</h2><button style="background:none; border:none; color:white; font-size:20px;">✕</button></div>
                <div style="padding:30px 20px;">
                    <label class="all-agree-box" id="b3-1">
                        <input type="checkbox" checked> 위 필수사항을 <strong>모두 확인하였고 동의</strong>합니다.
                        <span class="click-badge">클릭</span>
                    </label>
                </div>
                <div style="padding:15px 20px; display:flex; justify-content:center; background:#fafafa; border-top:1px solid #dee2e6;" id="b3-2">
                    <button class="btn-confirm">확인 <span class="click-badge" style="background:#0040d1; margin-left:10px;">클릭</span></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    async function t(id, s = true) {
        const b = document.getElementById(id).querySelector('.click-badge');
        if (s) b.classList.add('active-badge'); else b.classList.remove('active-badge');
    }
    async function run() {
        document.getElementById('startOverlay').classList.add('hidden');
        await sleep(800); await t('b1-1'); await sleep(1500); await t('b1-1', false); await t('b1-2'); await sleep(1800);
        document.getElementById('s1').classList.remove('active'); document.getElementById('s2').classList.add('active');
        await sleep(800); await t('b2-1'); await sleep(1500); await t('b2-1', false); await t('b2-2'); await sleep(1800);
        document.getElementById('s2').classList.remove('active'); document.getElementById('s3').classList.add('active');
        await sleep(800); await t('b3-1'); await sleep(1500); await t('b3-1', false); await t('b3-2'); await sleep(2500);
        location.reload();
    }
</script>
</body>
</html>
