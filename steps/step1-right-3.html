<div style="width:100%; min-width:0;">
  <div
    class="manual-step-view"
    data-step-view="3"
    style="position:relative; width:100%; height:620px; background:#fff; display:flex; align-items:flex-start; justify-content:center; overflow:auto; padding:34px 24px 36px; border:1px solid #d1d5db; border-radius:16px;"
  >
    <div style="width:400px; max-width:100%; text-align:center; margin:0 auto;">
      
      <!-- 여기 로고 -->
      <div style="text-align:left; margin-bottom:28px;">
        <img
          src="./Primary Logo.png"
          alt="logo"
          style="height:22px; width:auto; object-fit:contain;"
          onerror="this.style.display='none'"
        >
      </div>

      <div style="font-size:19px; font-weight:800; margin-bottom:12px; color:#000;">
        비밀번호 변경
      </div>

      <div style="font-size:14px; color:#0040d1; font-weight:700; margin-bottom:6px;">
        poomgo@dohands.com 계정의
      </div>

      <div style="font-size:14px; font-weight:700; margin-bottom:12px; color:#111827;">
        새로운 비밀번호를 입력해주세요.
      </div>

      <div style="font-size:12px; color:#6b7280; line-height:1.6; margin-bottom:30px;">
        비밀번호는 영어 대문자, 특수문자, 숫자를 포함한<br>
        10~16자리를 입력해주세요.
      </div>

      <div style="text-align:left; font-size:12px; font-weight:700; margin-bottom:6px; color:#111827;">
        새 비밀번호
      </div>
      <div style="height:44px; border:1px solid #e2e8f0; border-radius:8px; margin-bottom:16px; background:#f8fafc; display:flex; align-items:center; padding:0 12px; color:#9ca3af; letter-spacing:3px;">
       
      </div>

      <div style="text-align:left; font-size:12px; font-weight:700; margin-bottom:6px; color:#111827;">
        새 비밀번호 확인
      </div>
      <div style="height:44px; border:1px solid #e2e8f0; border-radius:8px; margin-bottom:25px; background:#f8fafc; display:flex; align-items:center; padding:0 12px; color:#9ca3af; letter-spacing:3px;">
     
      </div>

      <div
        style="height:52px; background:#0040d1; border-radius:8px; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; position:relative; box-shadow:0 10px 22px rgba(0,64,209,0.18);"
      >
        비밀번호 변경
        <div class="manual-click-pulse danger"></div>
      </div>
    </div>
  </div>

  <style>
    .manual-click-pulse {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(0, 64, 209, 0.22);
      border: 3px solid rgba(0, 64, 209, 0.82);
      box-shadow: 0 0 0 12px rgba(0, 64, 209, 0.08), 0 0 0 24px rgba(0, 64, 209, 0.04);
      pointer-events: none;
      animation: manualPulse 1.6s infinite ease-out;
    }

    .manual-click-pulse.danger {
      background: rgba(220, 38, 38, 0.22);
      border: 3px solid rgba(220, 38, 38, 0.88);
      box-shadow: 0 0 0 12px rgba(220, 38, 38, 0.10), 0 0 0 24px rgba(220, 38, 38, 0.05);
    }

    @keyframes manualPulse {
      0% {
        transform: translate(-50%, -50%) scale(0.72);
        opacity: 0.95;
      }
      70% {
        transform: translate(-50%, -50%) scale(1.18);
        opacity: 0.35;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.28);
        opacity: 0.08;
      }
    }
  </style>
</div>
